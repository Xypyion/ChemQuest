<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChemQuest — Chemistry Learning Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/character.css" />
  <style>
    .hero { display: grid; grid-template-columns: 1.05fr 1fr; gap: 30px; align-items: center; max-width: 1040px; width: 100%; }
    .hero-left { text-align: center; }
    .hero-left .title-xl { color: #fff; text-shadow: 0 4px 0 rgba(0,0,0,.12); letter-spacing: .5px; }
    .hero-left .lead { font-size: 1.2rem; color: var(--ink); background: rgba(255,255,255,.6); display: inline-block; padding: 8px 16px; border-radius: 999px; }
    .school { margin-top: 10px; font-weight: 600; color: var(--ink-soft); }
    .ruby-stage { display: grid; place-items: center; }
    .toggle { display: flex; background: #f0ecfb; border-radius: 14px; padding: 6px; margin-bottom: 8px; }
    .toggle button { flex: 1; border: none; background: transparent; font-family: var(--font); font-weight: 700; font-size: 1rem; padding: 10px; border-radius: 10px; cursor: pointer; color: var(--ink-soft); }
    .toggle button.active { background: #fff; color: var(--ink); box-shadow: 0 4px 12px rgba(60,40,120,.12); }
    .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .diff { border: 3px solid #e7e2f5; border-radius: 16px; padding: 12px 8px; text-align: center; cursor: pointer; transition: transform .1s, border-color .1s, background .1s; background: #fbfaff; }
    .diff:hover { transform: translateY(-3px); }
    .diff .emoji { font-size: 1.7rem; }
    .diff .name { font-weight: 700; margin-top: 4px; }
    .diff .desc { font-size: .72rem; color: var(--ink-soft); margin-top: 2px; }
    .diff.sel { border-color: var(--primary); background: #fff6ef; box-shadow: 0 6px 0 rgba(255,138,61,.25); }
    .err { color: var(--bad); font-weight: 600; min-height: 20px; margin-top: 8px; font-size: .92rem; }
    .teacher-hint { margin-top: 14px; font-size: .82rem; color: var(--ink-soft); text-align: center; }
    @media (max-width: 820px) { .hero { grid-template-columns: 1fr; } .ruby-stage { order: -1; } }
  </style>
</head>
<body>
  <div class="center-screen">
    <div class="hero pop-in">
      <div class="hero-left">
        <div class="ruby-stage" id="rubyStage"></div>
        <h1 class="title-xl">ChemQuest</h1>
        <p class="lead" data-i18n="welcome.lead">A colorful chemistry learning adventure 🧪✨</p>
        <p class="school" data-i18n="welcome.school">Suankularb Wittayalai Nonthaburi School</p>
      </div>

      <div class="card">
        <div class="toggle">
          <button id="tabLogin" class="active" onclick="showTab('login')" data-i18n="welcome.login">Log In</button>
          <button id="tabSignup" onclick="showTab('signup')" data-i18n="welcome.signup">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" autocomplete="on">
          <label for="loginEmail" data-i18n="welcome.email">Email</label>
          <input id="loginEmail" type="email" placeholder="you@skn.ac.th" required />
          <label for="loginPassword" data-i18n="welcome.password">Password</label>
          <input id="loginPassword" type="password" placeholder="Your password" data-i18n-ph="welcome.passwordPh" required />
          <div class="err" id="loginErr"></div>
          <button class="btn big block green" type="submit" data-i18n="welcome.start">Start Adventure ▶</button>
          <p class="teacher-hint" data-i18n="welcome.teacherHint">Teachers log in here too — you'll land in the Teacher Console.</p>
        </form>

        <!-- SIGNUP -->
        <form id="signupForm" class="hidden" autocomplete="on">
          <label for="suName" data-i18n="welcome.yourName">Your Name</label>
          <input id="suName" type="text" placeholder="e.g. Som Chai" data-i18n-ph="welcome.namePh" required />
          <label for="suEmail" data-i18n="welcome.email">Email</label>
          <input id="suEmail" type="email" placeholder="you@skn.ac.th" required />
          <label for="suPassword" data-i18n="welcome.password">Password</label>
          <input id="suPassword" type="password" placeholder="At least 6 characters" data-i18n-ph="welcome.passwordPh2" required />
          <label data-i18n="welcome.chooseDiff">Choose your difficulty</label>
          <div class="diff-grid" id="diffGrid">
            <div class="diff sel" data-diff="easy">
              <div class="emoji">🌱</div><div class="name" data-i18n="welcome.easy">Easy</div><div class="desc" data-i18n="welcome.easyDesc">Gentle start</div>
            </div>
            <div class="diff" data-diff="medium">
              <div class="emoji">⛰️</div><div class="name" data-i18n="welcome.medium">Medium</div><div class="desc" data-i18n="welcome.mediumDesc">A real climb</div>
            </div>
            <div class="diff" data-diff="hard">
              <div class="emoji">🏔️</div><div class="name" data-i18n="welcome.hard">Hard</div><div class="desc" data-i18n="welcome.hardDesc">Summit challenge</div>
            </div>
          </div>
          <div class="err" id="signupErr"></div>
          <button class="btn big block" type="submit" data-i18n="welcome.create">Create Explorer 🎒</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/character.js"></script>
  <script src="/js/welcome.js"></script>
</body>
</html>
