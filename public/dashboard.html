<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChemQuest — Adventure Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/character.css" />
  <link rel="stylesheet" href="/css/map.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="logo">🧪</span> ChemQuest</div>
    <div class="nav-actions">
      <span class="pill points">⭐ <b id="navPoints">0</b> <span data-i18n="nav.pts">pts</span></span>
      <span class="pill" id="navUser">🧑‍🎓 Explorer</span>
      <a class="btn ghost" href="/inventory.html" data-i18n="nav.certificates">🎖️ Certificates</a>
      <a class="btn secondary" href="/leaderboard.html" data-i18n="nav.leaderboard">🏆 Leaderboard</a>
      <button class="btn ghost" onclick="logout()" data-i18n="nav.logout">Log out</button>
    </div>
  </div>

  <div class="wrap">
    <div class="map-head">
      <h1 data-i18n="dash.title">Your Chemistry Adventure 🗺️</h1>
      <div class="progress-wrap">
        <div class="progress-bar"><span id="progFill"></span></div>
        <div class="progress-label" id="progLabel" data-i18n="dash.loadingMap">Loading your map…</div>
      </div>
    </div>

    <div class="scene" id="scene" aria-label="Adventure map"></div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/character.js"></script>
  <script src="/js/props.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
